<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sarok1 – DXF Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      font-family: monospace;
      font-size: 13px;
      background: #111;
      color: #ccc;
    }

    #sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #1a1a1a;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .section-header {
      font-size: 11px;
      padding: 8px 12px;
      color: #666;
      border-bottom: 1px solid #2a2a2a;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #file-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    #file-list li {
      padding: 7px 12px;
      cursor: pointer;
      border-bottom: 1px solid #1e1e1e;
      color: #aaa;
      word-break: break-all;
      line-height: 1.4;
    }

    #file-list li:hover { background: #252525; color: #eee; }
    #file-list li.active { background: #1d3a5f; color: #7cb9ff; }

    #layers-panel {
      flex-direction: column;
      border-top: 1px solid #333;
      min-height: 0;
      flex-shrink: 0;
      max-height: 45vh;
    }

    #layer-list {
      list-style: none;
      overflow-y: auto;
    }

    #layer-list li {
      padding: 4px 10px;
      display: flex;
      align-items: center;
      gap: 7px;
      border-bottom: 1px solid #1e1e1e;
      color: #aaa;
    }

    #layer-list li label {
      cursor: pointer;
      flex: 1;
      word-break: break-all;
      font-size: 12px;
    }

    #layer-list input[type=checkbox] { cursor: pointer; accent-color: #7cb9ff; flex-shrink: 0; }

    .layer-swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
      border: 1px solid #444;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #toolbar {
      padding: 6px 12px;
      background: #181818;
      border-bottom: 1px solid #2a2a2a;
      color: #555;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 16px;
      min-height: 32px;
      flex-shrink: 0;
    }

    #current-file { color: #7cb9ff; }

    #download-btn, .dl-btn {
      color: #888;
      text-decoration: none;
      border: 1px solid #333;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
    }

    #download-btn:hover, .dl-btn:hover { color: #ccc; border-color: #555; }

    #viewer {
      flex: 1;
      position: relative;
      background: #fff;
    }

    #placeholder {
      color: #999;
      text-align: center;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      background: #fff;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #error {
      color: #e06c75;
      padding: 20px;
      display: none;
      position: absolute;
      z-index: 10;
    }
  </style>
</head>
<body>

<nav id="sidebar">
  <div class="section-header">DXF Files</div>
  <ul id="file-list"></ul>
  <div id="layers-panel" style="display:none">
    <div class="section-header">Layers</div>
    <ul id="layer-list"></ul>
  </div>
</nav>

<div id="main">
  <div id="toolbar">
    <span id="current-file">no file selected</span>
    <a id="download-btn" href="#" download style="display:none">download</a>
    <a class="dl-btn" href="./sarok1.zip" download>download all</a>
  </div>
  <div id="viewer">
    <div id="placeholder">select a file</div>
    <div id="error"></div>
  </div>
</div>

<script type="module">
  import { DxfViewer, Color } from './dxf.bundle.js';

  const FONTS = ['./fonts/Roboto-Regular.woff'];

  const fileList     = document.getElementById('file-list');
  const viewerEl     = document.getElementById('viewer');
  const placeholder  = document.getElementById('placeholder');
  const errorDiv     = document.getElementById('error');
  const currentFile  = document.getElementById('current-file');
  const downloadBtn  = document.getElementById('download-btn');
  const layersPanel  = document.getElementById('layers-panel');
  const layerList    = document.getElementById('layer-list');

  const viewer = new DxfViewer(viewerEl, {
    autoResize: true,
    clearColor: new Color('#ffffff'),
    colorCorrection: true,
    retainParsedDxf: true,
    sceneOptions: {
      arcTessellationAngle: 2 / 180 * Math.PI,
      minArcTessellationSubdivisions: 32,
    },
  });

  // ── File list ────────────────────────────────────────────────────────────────
  const filesResp = await fetch('./files.txt');
  const files = (await filesResp.text()).split('\n').map(s => s.trim()).filter(s => s.endsWith('.dxf'));

  files.forEach(name => {
    const li = document.createElement('li');
    li.textContent = name.replace(/\.dxf$/, '');
    li.title = name;
    li.addEventListener('click', () => loadFile(name));
    fileList.appendChild(li);
  });

  const initialFile = new URLSearchParams(location.search).get('file');
  if (initialFile) loadFile(initialFile);

  // ── Load DXF ─────────────────────────────────────────────────────────────────
  async function loadFile(name) {
    history.pushState(null, '', '?file=' + encodeURIComponent(name));
    const li = fileList.querySelector(`li[title="${CSS.escape(name)}"]`);
    fileList.querySelectorAll('li').forEach(el => el.classList.remove('active'));
    li?.classList.add('active');
    currentFile.textContent = name;

    errorDiv.style.display = 'none';
    downloadBtn.style.display = 'none';
    layersPanel.style.display = 'none';
    layerList.innerHTML = '';

    try {
      const url = `./${encodeURIComponent(name)}`;
      await viewer.Load({ url, fonts: FONTS });
      placeholder.style.display = 'none';
      downloadBtn.href = url;
      downloadBtn.download = name;
      downloadBtn.style.display = '';
      buildLayerList(thicknessPerLayer(viewer.GetDxf()));
    } catch (err) {
      errorDiv.textContent = String(err);
      errorDiv.style.display = 'block';
    }
  }

  // ── Layer list ───────────────────────────────────────────────────────────────
  function layerColor(color) {
    return '#' + color.toString(16).padStart(6, '0');
  }

  function thicknessPerLayer(dxf) {
    const map = new Map();
    if (!dxf || !dxf.entities) return map;
    for (const e of dxf.entities) {
      if (e.thickness != null && e.thickness !== 0 && e.layer) {
        map.set(e.layer, e.thickness);
      }
    }
    return map;
  }

  function buildLayerList(thicknessMap = new Map()) {
    layerList.innerHTML = '';
    const layers = [...viewer.GetLayers()].map(l => ({ ...l, isVisible: true }));
    if (layers.length === 0) return;

    // "All" toggle row
    const allItem = document.createElement('li');
    const allCb = document.createElement('input');
    allCb.type = 'checkbox';
    allCb.checked = true;
    allCb.addEventListener('change', () => {
      layers.forEach(l => {
        l.isVisible = allCb.checked;
        viewer.ShowLayer(l.name, l.isVisible);
      });
      layerList.querySelectorAll('input[data-layer]').forEach(cb => { cb.checked = allCb.checked; });
    });
    const allLabel = document.createElement('label');
    allLabel.textContent = 'All layers';
    allLabel.style.fontStyle = 'italic';
    allItem.appendChild(allCb);
    allItem.appendChild(allLabel);
    layerList.appendChild(allItem);

    layers.forEach(layer => {
      const item = document.createElement('li');

      const swatch = document.createElement('span');
      swatch.className = 'layer-swatch';
      swatch.style.background = layerColor(layer.color);

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = true;
      cb.dataset.layer = layer.name;
      cb.addEventListener('change', () => {
        layer.isVisible = cb.checked;
        viewer.ShowLayer(layer.name, cb.checked);
        allCb.checked = layers.every(l => l.isVisible);
      });

      const label = document.createElement('label');
      const t = thicknessMap.get(layer.name);
      label.textContent = t != null ? `${layer.displayName} (${t}mm)` : layer.displayName;

      item.appendChild(swatch);
      item.appendChild(cb);
      item.appendChild(label);
      layerList.appendChild(item);
    });

    layersPanel.style.display = 'flex';
  }
</script>
</body>
</html>
